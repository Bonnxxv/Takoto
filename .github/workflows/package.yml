name: Package Takoto for MacOS, Windows, and Linux
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build for'
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            arch: arm64
            target: aarch64-apple-darwin
            features: mac-aarch
            pkg_suffix: ARM
          - platform: macos-13
            arch: x86_64
            target: x86_64-apple-darwin
            features: mac-x86_64
            pkg_suffix: Intel

    runs-on: ${{ matrix.platform }}

    steps:
    - name: Checkout Takoto Repo Code
      uses: actions/checkout@v4

    - name: Ensure TAG is set
      run: |
        if [ -z "${TAG}" ]; then
          echo "ERROR: TAG is empty."
          exit 1
        fi

    - name: Import Apple Certificates
      env:
        APP_CERTIFICATE_BASE64: ${{ secrets.APPLE_SIGNING_CERTIFICATE }}
        APP_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
        INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        APPLE_NOTARIZE_KEY: ${{ secrets.APPLE_NOTARIZE_KEY }}
        APPLE_NOTARIZE_ID: ${{ secrets.APPLE_NOTARIZE_ID }}
        APPLE_ISSUER: ${{ secrets.APPLE_ISSUER }}
      run: |
        APP_CERT_PATH=$RUNNER_TEMP/app_certificate.p12
        INSTALLER_CERT_PATH=$RUNNER_TEMP/installer_certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
        echo "$APP_CERTIFICATE_BASE64" | base64 --decode > $APP_CERT_PATH
        echo "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode > $INSTALLER_CERT_PATH
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychains -s $KEYCHAIN_PATH
        security import $APP_CERT_PATH -P "$APP_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security import $INSTALLER_CERT_PATH -P "$INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        echo "$APPLE_NOTARIZE_KEY" | base64 --decode > Notarization_AuthKey.p8
        xcrun notarytool store-credentials "AC_PASSWORD" \
          --key "Notarization_AuthKey.p8" \
          --key-id "$APPLE_NOTARIZE_ID" \
          --issuer "$APPLE_ISSUER"

    - name: Install Dependencies
      run: |
        cd Takoto-App
        npm install

    - name: Download ffmpeg/ffprobe binaries
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        set -euo pipefail
        cd Takoto-App/src-tauri/binaries
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          ZIP_NAME="ffmpeg-aarch64-apple-darwin.zip"
          FFMPEG_SRC="ffmpeg-aarch64-apple-darwin"
          FFPROBE_SRC="ffprobe-aarch64-apple-darwin"
        else
          ZIP_NAME="ffmpeg-x86_64-apple-darwin.zip"
          FFMPEG_SRC="ffmpeg-x86_64-apple-darwin"
          FFPROBE_SRC="ffprobe-x86_64-apple-darwin"
        fi
        gh release download --repo tmoroney/ffmpeg-binaries --pattern "$ZIP_NAME" --clobber
        unzip -jo "$ZIP_NAME"
        chmod +x "$FFMPEG_SRC" "$FFPROBE_SRC"
        rm -f "$ZIP_NAME"

    - name: Build Tauri
      run: |
        cd Takoto-App
        export APPLE_SIGNING_IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY }}"
        export TAURI_SIGNING_PRIVATE_KEY="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
        export TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}"
        npm run tauri build -- -- --no-default-features --features "${{ matrix.features }}"

    - name: Create Mac Package
      run: |
        mkdir Mac-Package/Payload
        mv Takoto-App/src-tauri/target/release/bundle/macos/Takoto.app Mac-Package/Payload

    - name: Create PKG Installer
      run: |
        chmod +x Mac-Package/Scripts/*
        VERSION="${TAG#v}"
        pkgbuild --identifier com.takoto \
          --version "$VERSION" \
          --install-location "/Applications" \
          --root Mac-Package/Payload \
          --scripts Mac-Package/Scripts \
          Takoto-unsigned.pkg

    - name: Sign PKG Installer
      run: |
        productsign --sign "Developer ID Installer: ${{ secrets.APPLE_IDENTITY }}" \
          --timestamp \
          "Takoto-unsigned.pkg" \
          "Takoto-Mac-${{ matrix.pkg_suffix }}.pkg"

    - name: Notarize PKG Installer
      run: |
        notarize_and_staple() {
          xcrun notarytool submit "Takoto-Mac-${{ matrix.pkg_suffix }}.pkg" \
            --keychain-profile "AC_PASSWORD" \
            --wait
          xcrun stapler staple "Takoto-Mac-${{ matrix.pkg_suffix }}.pkg"
        }
        for i in {1..3}; do
          notarize_and_staple && break || {
            echo "Notarization attempt $i failed. Retrying..."
            sleep 10
          }
        done

    - name: Collect Tauri Updater Artifacts (macOS)
      run: |
        set -euo pipefail
        MACOS_BUNDLE_DIR="Takoto-App/src-tauri/target/release/bundle/macos"
        OUT_DIR="release-artifacts"
        mkdir -p "$OUT_DIR"
        if [ -f "$MACOS_BUNDLE_DIR/Takoto.app.tar.gz" ]; then
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            NEW_NAME="Takoto-macos-aarch64.app.tar.gz"
          else
            NEW_NAME="Takoto-macos-x86_64.app.tar.gz"
          fi
          mv "$MACOS_BUNDLE_DIR/Takoto.app.tar.gz" "$MACOS_BUNDLE_DIR/$NEW_NAME"
          mv "$MACOS_BUNDLE_DIR/Takoto.app.tar.gz.sig" "$MACOS_BUNDLE_DIR/$NEW_NAME.sig"
        fi
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          cp "$MACOS_BUNDLE_DIR/Takoto-macos-aarch64.app.tar.gz" "$OUT_DIR/"
          cp "$MACOS_BUNDLE_DIR/Takoto-macos-aarch64.app.tar.gz.sig" "$OUT_DIR/"
        else
          cp "$MACOS_BUNDLE_DIR/Takoto-macos-x86_64.app.tar.gz" "$OUT_DIR/"
          cp "$MACOS_BUNDLE_DIR/Takoto-macos-x86_64.app.tar.gz.sig" "$OUT_DIR/"
        fi

    - name: Upload Build Artifacts to Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          Takoto-Mac-${{ matrix.pkg_suffix }}.pkg
          release-artifacts/*
        token: ${{ secrets.GH_TOKEN }}
        tag_name: ${{ env.TAG }}

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Takoto Repo Code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Install npm dependencies
      run: |
        cd Takoto-App
        npm install

    - name: Download ffmpeg/ffprobe binaries (Windows)
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      shell: bash
      run: |
        set -euo pipefail
        cd Takoto-App/src-tauri/binaries

        ZIP_NAME="ffmpeg-x86_64-pc-windows-msvc.zip"
        gh release download \
          --repo tmoroney/ffmpeg-binaries \
          --pattern "$ZIP_NAME" \
          --clobber

        unzip -jo "$ZIP_NAME"
        rm -f "$ZIP_NAME"

    - name: Build Tauri (Windows)
      env:
        TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      run: |
        cd Takoto-App
        npm run tauri build -- -- --no-default-features --features windows

    - name: Collect Windows artifacts
      shell: bash
      run: |
        set -euo pipefail
        BUNDLE_DIR="Takoto-App/src-tauri/target/release/bundle"
        OUT_DIR="release-artifacts"
        mkdir -p "$OUT_DIR"

        # NSIS installer (.exe)
        NSIS_EXE=$(ls -1 "$BUNDLE_DIR/nsis/"*.exe 2>/dev/null | head -n1 || true)
        if [ -n "$NSIS_EXE" ]; then
          cp "$NSIS_EXE" "$OUT_DIR/Takoto-windows-x86_64-setup.exe"
        fi

        # Updater artifacts (.exe + .sig)
        UPDATER_EXE=$(ls -1 "$BUNDLE_DIR/nsis/"*.exe.zip 2>/dev/null | head -n1 || true)
        if [ -n "$UPDATER_EXE" ]; then
          cp "$UPDATER_EXE" "$OUT_DIR/Takoto-windows-x86_64.exe.zip"
        fi
        UPDATER_SIG=$(ls -1 "$BUNDLE_DIR/nsis/"*.exe.zip.sig 2>/dev/null | head -n1 || true)
        if [ -n "$UPDATER_SIG" ]; then
          cp "$UPDATER_SIG" "$OUT_DIR/Takoto-windows-x86_64.exe.sig"
        fi

    - name: Upload Windows artifacts to Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-artifacts/*
        token: ${{ secrets.GH_TOKEN }}
        tag_name: ${{ env.TAG }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Takoto Repo Code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            pkg-config \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libshaderc-dev \
            shaderc \
            spirv-tools \
            glslang-tools

      - name: Install npm dependencies
        run: |
          cd Takoto-App
          npm install

      - name: Download ffmpeg/ffprobe binaries (Linux)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          cd Takoto-App/src-tauri/binaries
          ZIP_NAME="ffmpeg-x86_64-unknown-linux-gnu.zip"
          gh release download \
            --repo tmoroney/ffmpeg-binaries \
            --pattern "$ZIP_NAME" \
            --clobber
          unzip -jo "$ZIP_NAME"
          chmod +x ffmpeg-x86_64-unknown-linux-gnu ffprobe-x86_64-unknown-linux-gnu
          rm -f "$ZIP_NAME"

      - name: Build Tauri (Linux)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd Takoto-App
          npm run tauri build -- -- --no-default-features --features linux

      - name: Collect Linux artifacts
        run: |
          set -euo pipefail
          LINUX_BUNDLE_DIR="Takoto-App/src-tauri/target/release/bundle"
          DEB_FILE=$(ls -1 "$LINUX_BUNDLE_DIR/deb"/*.deb 2>/dev/null | head -n1 || true)
          if [ -n "$DEB_FILE" ]; then
            cp "$DEB_FILE" .
          fi

      - name: Upload Linux artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.deb"
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}

  compose-latest-json:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is available
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compose latest.json
        env:
          TAG: ${{ env.TAG }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p latest

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Takoto-macos-aarch64.app.tar.gz.sig" \
            --dir latest --clobber

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Takoto-macos-x86_64.app.tar.gz.sig" \
            --dir latest --clobber

          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Takoto-windows-x86_64.exe.sig" \
            --dir latest --clobber || true

          ARM_SIG="$(cat latest/Takoto-macos-aarch64.app.tar.gz.sig)"
          INTEL_SIG="$(cat latest/Takoto-macos-x86_64.app.tar.gz.sig)"
          WINDOWS_SIG="$(cat latest/Takoto-windows-x86_64.exe.sig 2>/dev/null || true)"

          VERSION="${TAG#v}"
          PUB_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          NOTES='${{ github.event.release.name }}'

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg notes "$NOTES" \
            --arg arm_sig "$ARM_SIG" \
            --arg intel_sig "$INTEL_SIG" \
            --arg windows_sig "$WINDOWS_SIG" \
            --arg tag "$TAG" \
            '{
              version: $version,
              pub_date: $pub_date,
              notes: $notes,
              platforms: {
                "darwin-aarch64": {
                  signature: $arm_sig,
                  url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/Takoto-macos-aarch64.app.tar.gz")
                },
                "darwin-x86_64": {
                  signature: $intel_sig,
                  url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/Takoto-macos-x86_64.app.tar.gz")
                },
                "windows-x86_64": (
                  if ($windows_sig | length) > 0 then
                    {
                      signature: $windows_sig,
                      url: ("https://github.com/" + env.GITHUB_REPOSITORY + "/releases/download/" + $tag + "/Takoto-windows-x86_64.exe.zip")
                    }
                  else empty end
                )
              }
            }' > latest.json

      - name: Upload latest.json to Release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          token: ${{ secrets.GH_TOKEN }}
          tag_name: ${{ env.TAG }}
